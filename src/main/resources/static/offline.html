<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LughatPro — Offline</title>
    <style>
        :root { --gold:#c9a84c; --dark:#0f0f14; --text:#e8e8f0; --muted:#8b8b9a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
          font-family:'DM Sans',system-ui,sans-serif;
          background:var(--dark); color:var(--text);
          min-height:100vh; display:flex; align-items:center; justify-content:center;
        }
        .card {
          text-align:center; padding:3rem 2rem; max-width:400px;
          background:#1a1a24; border:1px solid rgba(201,168,76,0.2);
          border-radius:24px;
        }
        .icon  { font-size:4rem; margin-bottom:1.5rem; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        h1   { font-size:1.6rem; font-weight:700; margin-bottom:0.75rem; color:var(--gold); }
        p    { color:var(--muted); line-height:1.6; margin-bottom:2rem; font-size:0.95rem; }
        .btn {
          display:inline-block; padding:0.8rem 2rem;
          background:linear-gradient(135deg,#c9a84c,#b8952e);
          border:none; border-radius:12px; color:#0f0f14;
          font-weight:700; font-size:1rem; cursor:pointer;
          text-decoration:none; transition:transform 0.2s;
        }
        .btn:hover { transform:translateY(-2px); }
        .hint { margin-top:1.5rem; font-size:0.8rem; color:var(--muted); }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📖</div>
    <h1>You're Offline</h1>
    <p>LughatPro needs an internet connection to show dictionary words. Please check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="hint">Previously viewed pages may still be available from cache.</div>
</div>
</body>
</html>
