<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LughatPro — Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
          --gold: #c9a84c; --gold-light: #e8c96e;
          --dark: #0f0f14; --dark2: #1a1a24; --dark3: #252533;
          --emerald: #2dd4bf; --text: #e8e8f0; --text-muted: #8b8b9a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh;overflow:hidden;}
        .urdu { font-family:'Noto Nastaliq Urdu','Jameel Noori Nastaleeq',serif; direction:rtl; line-height:2.2; font-size:1.1em; }

        /* Sidebar */
        .sidebar {
          width:260px; height:100vh; position:fixed; left:0; top:0; z-index:100;overflow-y:auto;
          background:linear-gradient(180deg,var(--dark2) 0%,var(--dark) 100%);
          border-right:1px solid rgba(201,168,76,0.12);
          display:flex; flex-direction:column;
          transition: transform 0.3s ease;
        }
        .sidebar-logo {
          padding:1.8rem 1.5rem 1.2rem;
          border-bottom:1px solid rgba(201,168,76,0.1);
        }
        .logo-text { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:900;
          background:linear-gradient(135deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-sub { font-size:0.72rem; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }

        .nav-section { padding:1.5rem 1rem; flex:1; overflow-y:auto; }
        .nav-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted);
          font-weight:600; padding:0 0.5rem; margin-bottom:0.6rem; }
        .nav-item {
          display:flex; align-items:center; gap:0.75rem; padding:0.7rem 0.75rem;
          border-radius:10px; cursor:pointer; margin-bottom:0.2rem;
          color:var(--text-muted); font-size:0.88rem; font-weight:500;
          transition:all 0.2s; text-decoration:none;
        }
        .nav-item:hover { background:rgba(201,168,76,0.08); color:var(--text); }
        .nav-item.active { background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.06));
          color:var(--gold-light); border-left:2px solid var(--gold); }
        .nav-icon { font-size:1.1rem; width:20px; text-align:center; }

        .sidebar-user {
          padding:1.2rem 1.5rem; border-top:1px solid rgba(201,168,76,0.1);
          display:flex; align-items:center; gap:0.75rem;
        }
        .user-avatar {
          width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),#b8952e);
          display:flex; align-items:center; justify-content:center;
          font-size:0.85rem; font-weight:700; color:var(--dark); flex-shrink:0;
        }
        .user-name { font-size:0.88rem; font-weight:600; color:var(--text); }
        .user-role { font-size:0.72rem; color:var(--emerald); }
        .logout-btn { margin-left:auto; background:none; border:none; cursor:pointer; color:var(--text-muted);
          font-size:1.2rem; transition:color 0.2s; }
        .logout-btn:hover { color:#ef4444; }

        /* Main content */
        .main { margin-left:260px; padding:2rem;height:100vh; overflow-y:auto;}
        .page { display:none; }
        .page.active { display:block; }

        /* Topbar */
        .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-title { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:var(--text); }
        .page-title span { color:var(--gold); }

        /* Global search */
        .search-bar {
          display:flex; gap:0.75rem; margin-bottom:2rem; max-width:700px;
        }
        .search-input-wrap { flex:1; position:relative; }
        .search-input {
          width:100%; padding:0.85rem 1rem 0.85rem 3rem;
          background:var(--dark3); border:1px solid rgba(201,168,76,0.2);
          border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem;
          outline:none; transition:all 0.3s;
        }
        .search-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
        .search-icon { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:1rem; color:var(--text-muted); }
        .btn-gold {
          padding:0.8rem 1.5rem; background:linear-gradient(135deg,var(--gold),#b8952e);
          border:none; border-radius:10px; color:var(--dark); font-family:'DM Sans',sans-serif;
          font-weight:700; font-size:0.9rem; cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .btn-gold:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,168,76,0.3); }
        .btn-outline {
          padding:0.6rem 1.2rem; background:transparent;
          border:1px solid rgba(201,168,76,0.3); border-radius:8px;
          color:var(--gold); font-family:'DM Sans',sans-serif; font-weight:500; font-size:0.85rem;
          cursor:pointer; transition:all 0.2s;
        }
        .btn-outline:hover { background:rgba(201,168,76,0.1); }

        /* Subject grid */
        .subjects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.2rem; }
        .subject-card {
          background:var(--dark3); border:1px solid rgba(255,255,255,0.06);
          border-radius:16px; padding:1.5rem; cursor:pointer;
          transition:all 0.3s; position:relative; overflow:hidden;
        }
        .subject-card::before {
          content:''; position:absolute; inset:0; opacity:0;
          background:linear-gradient(135deg,rgba(201,168,76,0.05),transparent);
          transition:opacity 0.3s;
        }
        .subject-card:hover { border-color:rgba(201,168,76,0.35); transform:translateY(-3px);
          box-shadow:0 12px 30px rgba(0,0,0,0.4); }
        .subject-card:hover::before { opacity:1; }
        .subject-icon { font-size:2.2rem; margin-bottom:0.9rem; }
        .subject-name { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
        .subject-count { font-size:0.8rem; color:var(--text-muted); }
        .subject-count span { color:var(--gold); font-weight:600; }
        .subject-dot { width:8px; height:8px; border-radius:50%; position:absolute; top:1.2rem; right:1.2rem; }

        /* Word list section */
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.8rem; }
        .back-btn {
          display:flex; align-items:center; gap:0.5rem; background:none; border:none;
          color:var(--text-muted); cursor:pointer; font-size:0.88rem; transition:color 0.2s;
        }
        .back-btn:hover { color:var(--gold); }

        /* Word cards */
        .words-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem; }
        .word-card {
          background:var(--dark3); border:1px solid rgba(255,255,255,0.06);
          border-radius:14px; padding:1.3rem; cursor:pointer;
          transition:all 0.25s;
        }
        .word-card:hover { border-color:rgba(201,168,76,0.3); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
        .word-english { font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:0.4rem; }
        .word-urdu { font-size:1.1rem; color:var(--gold-light); margin-bottom:0.5rem; }
        .word-pos { display:inline-block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em;
          padding:2px 8px; border-radius:20px; background:rgba(201,168,76,0.12); color:var(--gold); font-weight:600; }
        .word-meaning { font-size:0.83rem; color:var(--text-muted); margin-top:0.5rem; line-height:1.5;
          display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

        /* Word detail modal */
        .modal-overlay {
          position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
          display:flex; align-items:center; justify-content:center; padding:1rem;
          opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal {
          background:var(--dark2); border:1px solid rgba(201,168,76,0.2);
          border-radius:20px; width:100%; max-width:560px; max-height:85vh;
          overflow-y:auto; transform:translateY(20px); transition:transform 0.3s;
        }
        .modal-overlay.open .modal { transform:translateY(0); }
        .modal-header { padding:1.5rem 1.8rem; border-bottom:1px solid rgba(255,255,255,0.06);
          display:flex; justify-content:space-between; align-items:center; }
        .modal-close { background:none; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer; }
        .modal-body { padding:1.8rem; }
        .detail-row { display:flex; gap:1rem; margin-bottom:1rem; }
        .detail-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;
          color:var(--text-muted); font-weight:600; min-width:110px; padding-top:2px; }
        .detail-value { font-size:0.92rem; color:var(--text); line-height:1.6; }

        /* Pagination */
        .pagination { display:flex; justify-content:center; align-items:center; gap:0.5rem; margin-top:2rem; flex-wrap:wrap; }
        .page-btn { padding:0.5rem 0.9rem; border-radius:8px; border:1px solid rgba(201,168,76,0.2);
          background:transparent; color:var(--text-muted); cursor:pointer; font-size:0.88rem; transition:all 0.2s; }
        .page-btn:hover, .page-btn.active { background:var(--gold); border-color:var(--gold); color:var(--dark); font-weight:600; }
        .page-btn:disabled { opacity:0.35; cursor:default; }
        .page-info { font-size:0.82rem; color:var(--text-muted); }

        /* Loading */
        .loading { display:flex; justify-content:center; align-items:center; padding:4rem; }
        .spinner { width:36px; height:36px; border:3px solid rgba(201,168,76,0.2);
          border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Empty state */
        .empty-state { text-align:center; padding:4rem 2rem; }
        .empty-icon { font-size:3.5rem; margin-bottom:1rem; }
        .empty-title { font-size:1.1rem; color:var(--text-muted); font-weight:500; }

        /* Mobile sidebar toggle */
        .menu-toggle { display:none; background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer; }
        .overlay-bg { display:none; }

        @media(max-width:768px) {
          .sidebar { transform:translateX(-100%); }
          .sidebar.open { transform:translateX(0); }
          .main { margin-left:0; padding:1rem; }
          .menu-toggle { display:block; }
          .overlay-bg { display:block; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99;
            opacity:0; pointer-events:none; transition:opacity 0.3s; }
          .overlay-bg.open { opacity:1; pointer-events:all; }
          .subjects-grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.8rem; }
          .words-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-text">📖 LughatPro</div>
        <div class="logo-sub">Member Dashboard</div>
    </div>
    <nav class="nav-section">
        <div class="nav-label">Navigation</div>
        <a class="nav-item active" onclick="showPage('home')" id="nav-home">
            <span class="nav-icon">🏠</span> Home
        </a>
        <a class="nav-item" onclick="showPage('search')" id="nav-search">
            <span class="nav-icon">🔍</span> Search Words
        </a>
        <div class="nav-label" style="margin-top:1rem;">Subjects</div>
        <div id="subjectNav"></div>
    </nav>
    <div class="sidebar-user">
        <div class="user-avatar" id="userInitial">M</div>
        <div>
            <div class="user-name" id="sidebarUsername">Member</div>
            <div class="user-role">Read-only Access</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">⏏️</button>
    </div>
</aside>
<div class="overlay-bg" id="overlayBg" onclick="closeSidebar()"></div>

<!-- Main -->
<main class="main">
    <!-- Mobile topbar -->
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold);">LughatPro</span>
    </div>

    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
        <div class="topbar">
            <div>
                <div class="page-title">Welcome to <span>LughatPro</span></div>
                <div style="color:var(--text-muted);font-size:0.88rem;margin-top:0.3rem;">Browse subjects or search across the entire dictionary</div>
            </div>
        </div>

        <!-- Global search bar -->
        <div class="search-bar" style="max-width:100%;margin-bottom:2.5rem;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="homeSearch" placeholder="Search English words or Urdu meanings..." oninput="debounceSearch()"/>
            </div>
            <button class="btn-gold" onclick="runGlobalSearch()">Search</button>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem;" id="statsRow">
            <div style="background:var(--dark3);border:1px solid rgba(201,168,76,0.12);border-radius:14px;padding:1.2rem;">
                <div style="font-size:1.8rem;font-weight:700;color:var(--gold);" id="totalSubjectsCount">—</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Total Subjects</div>
            </div>
            <div style="background:var(--dark3);border:1px solid rgba(45,212,191,0.12);border-radius:14px;padding:1.2rem;">
                <div style="font-size:1.8rem;font-weight:700;color:var(--emerald);" id="totalWordsCount">—</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Total Words</div>
            </div>
        </div>

        <!-- Subjects -->
        <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:1rem;">📚 Browse Subjects</div>
        <div class="subjects-grid" id="subjectsGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- SUBJECT WORDS PAGE -->
    <div class="page" id="page-subject">
        <div class="section-header">
            <button class="back-btn" onclick="goBack()">← Back to Subjects</button>
            <div style="font-size:0.85rem;color:var(--text-muted);" id="subjectWordCount"></div>
        </div>

        <div class="topbar">
            <div>
                <div class="page-title" id="subjectPageTitle">Subject</div>
                <div style="color:var(--text-muted);font-size:0.85rem;margin-top:0.3rem;" id="subjectPageDesc"></div>
            </div>
        </div>

        <!-- Subject search -->
        <div class="search-bar" style="max-width:600px;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="subjectSearch" placeholder="Search within this subject..." oninput="debounceSubjectSearch()"/>
            </div>
            <button class="btn-outline" onclick="clearSubjectSearch()">Clear</button>
        </div>

        <div id="subjectWordsContainer"></div>
        <div class="pagination" id="subjectPagination"></div>
    </div>

    <!-- GLOBAL SEARCH PAGE -->
    <div class="page" id="page-search">
        <div class="topbar">
            <div class="page-title">🔍 <span>Search Dictionary</span></div>
        </div>
        <div class="search-bar" style="max-width:700px;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="globalSearchInput" placeholder="Type English or Urdu word to search..." onkeydown="if(event.key==='Enter')runPageSearch()"/>
            </div>
            <button class="btn-gold" onclick="runPageSearch()">Search</button>
        </div>
        <div id="searchResultsContainer"></div>
        <div class="pagination" id="searchPagination"></div>
    </div>
</main>

<!-- Word Detail Modal -->
<div class="modal-overlay" id="wordModal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div>
                <div style="font-size:1.3rem;font-weight:700;" id="modalEngWord"></div>
                <div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px;" id="modalSubjectName"></div>
            </div>
            <button class="modal-close" onclick="document.getElementById('wordModal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
const API = 'https://dictionary-app-xsxj.onrender.com/api';
fetch("/api/auth/login");
    let authToken = '';
    let subjects = [];
    let currentSubjectId = null;
    let currentPage = 0;
    let currentSearchKeyword = '';
    let searchDebounceTimer;

    // Auth check
    const userStr = localStorage.getItem('user');
    if (!userStr) { window.location.href = 'index.html'; }
    const user = JSON.parse(userStr);
    authToken = user.token;
    if (user.role === 'ROLE_ADMIN') { window.location.href = '/admin'; }

    // Init UI
    document.getElementById('userInitial').textContent = (user.username || 'M')[0].toUpperCase();
    document.getElementById('sidebarUsername').textContent = user.fullName || user.username;

    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` });

    async function loadSubjects() {
      const res = await fetch(`${API}/subjects`, { headers: headers() });
      subjects = await res.json();

      document.getElementById('totalSubjectsCount').textContent = subjects.length;

      // Load total word count
      fetch(`${API}/words/stats`, { headers: headers() })
        .then(r => r.json()).then(d => {
          document.getElementById('totalWordsCount').textContent = (d.totalWords || 0).toLocaleString();
        }).catch(() => {});

      // Render subject nav
      const nav = document.getElementById('subjectNav');
      nav.innerHTML = subjects.map(s => `
        <a class="nav-item" onclick="openSubject(${s.id})" id="nav-s-${s.id}">
          <span class="nav-icon">${s.icon || '📚'}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.name}</span>
          <span style="font-size:0.7rem;background:rgba(201,168,76,0.12);color:var(--gold);padding:1px 6px;border-radius:10px;">${s.wordCount || 0}</span>
        </a>
      `).join('');

      // Render subject cards
      const grid = document.getElementById('subjectsGrid');
      grid.innerHTML = subjects.map(s => `
        <div class="subject-card" onclick="openSubject(${s.id})" style="border-top:3px solid ${s.color || '#c9a84c'};">
          <div class="subject-dot" style="background:${s.color || '#c9a84c'};"></div>
          <div class="subject-icon">${s.icon || '📚'}</div>
          <div class="subject-name">${s.name}</div>
          <div class="subject-count"><span>${s.wordCount || 0}</span> words</div>
          ${s.description ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem;line-height:1.4;">${s.description}</div>` : ''}
        </div>
      `).join('');
    }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      const nav = document.getElementById('nav-' + name);
      if (nav) nav.classList.add('active');
      closeSidebar();
    }

    async function openSubject(id) {
      currentSubjectId = id;
      currentPage = 0;
      currentSearchKeyword = '';
      document.getElementById('subjectSearch').value = '';
      const subject = subjects.find(s => s.id === id);
      if (subject) {
        document.getElementById('subjectPageTitle').innerHTML = `${subject.icon || '📚'} <span style="color:var(--gold)">${subject.name}</span>`;
        document.getElementById('subjectPageDesc').textContent = subject.description || '';
      }
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navItem = document.getElementById('nav-s-' + id);
      if (navItem) navItem.classList.add('active');
      showPage('subject');
      await loadSubjectWords();
      closeSidebar();
    }

    async function loadSubjectWords() {
      const container = document.getElementById('subjectWordsContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      const keyword = currentSearchKeyword;
      let url;
      if (keyword) {
        url = `${API}/words/subject/${currentSubjectId}/search?keyword=${encodeURIComponent(keyword)}&page=${currentPage}&size=20`;
      } else {
        url = `${API}/words/subject/${currentSubjectId}?page=${currentPage}&size=20`;
      }
      try {
        const res = await fetch(url, { headers: headers() });
        const data = await res.json();
        document.getElementById('subjectWordCount').textContent = `${data.totalItems} words found`;
        renderWords(data.content, 'subjectWordsContainer');
        renderPagination(data, 'subjectPagination', loadSubjectWords);
      } catch(e) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load words</div></div>'; }
    }

    function debounceSubjectSearch() {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        currentSearchKeyword = document.getElementById('subjectSearch').value.trim();
        currentPage = 0;
        loadSubjectWords();
      }, 400);
    }

    function clearSubjectSearch() {
      document.getElementById('subjectSearch').value = '';
      currentSearchKeyword = '';
      currentPage = 0;
      loadSubjectWords();
    }

    function debounceSearch() {
      clearTimeout(searchDebounceTimer);
      const val = document.getElementById('homeSearch').value.trim();
      if (!val) return;
      searchDebounceTimer = setTimeout(() => runGlobalSearch(), 500);
    }

    async function runGlobalSearch() {
      const keyword = document.getElementById('homeSearch').value.trim();
      if (!keyword) return;
      document.getElementById('globalSearchInput').value = keyword;
      showPage('search');
      currentSearchKeyword = keyword;
      currentPage = 0;
      await fetchGlobalSearch();
    }

    async function runPageSearch() {
      const keyword = document.getElementById('globalSearchInput').value.trim();
      if (!keyword) return;
      currentSearchKeyword = keyword;
      currentPage = 0;
      await fetchGlobalSearch();
    }

    async function fetchGlobalSearch() {
      const container = document.getElementById('searchResultsContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const res = await fetch(`${API}/words/global-search?keyword=${encodeURIComponent(currentSearchKeyword)}&page=${currentPage}&size=20`, { headers: headers() });
        const data = await res.json();
        if (data.totalItems === 0) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><div class="empty-title">No results found for "<strong>${currentSearchKeyword}</strong>"</div></div>`;
        } else {
          container.innerHTML = `<div style="margin-bottom:1rem;font-size:0.85rem;color:var(--text-muted);">Found <strong style="color:var(--gold)">${data.totalItems}</strong> results</div>`;
          renderWords(data.content, 'searchResultsContainer', true);
        }
        renderPagination(data, 'searchPagination', fetchGlobalSearch);
      } catch(e) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Search failed</div></div>'; }
    }

    function renderWords(words, containerId, append = false) {
      const container = document.getElementById(containerId);
      if (!words || words.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No words found</div></div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'words-grid';
      grid.innerHTML = words.map(w => `
        <div class="word-card" onclick="showWordDetail(${JSON.stringify(w).replace(/"/g, '&quot;')})">
          <div class="word-english">${escHtml(w.englishWord)}</div>
          ${w.urduMeaning ? `<div class="word-urdu urdu">${escHtml(w.urduMeaning)}</div>` : ''}
          ${w.partOfSpeech ? `<span class="word-pos">${escHtml(w.partOfSpeech)}</span>` : ''}
          ${w.englishMeaning ? `<div class="word-meaning">${escHtml(w.englishMeaning)}</div>` : ''}
          ${w.subjectName ? `<div style="margin-top:0.6rem;font-size:0.72rem;color:var(--text-muted);">📚 ${escHtml(w.subjectName)}</div>` : ''}
        </div>
      `).join('');
      if (append && container.querySelector('.words-grid')) {
        container.querySelector('.words-grid').replaceWith(grid);
      } else if (append) {
        container.appendChild(grid);
      } else {
        container.innerHTML = '';
        container.appendChild(grid);
      }
    }

    function showWordDetail(word) {
      document.getElementById('modalEngWord').textContent = word.englishWord;
      document.getElementById('modalSubjectName').textContent = word.subjectName || '';
      const rows = [
        ['Urdu Meaning', word.urduMeaning, true],
        ['English Meaning', word.englishMeaning],
        ['Part of Speech', word.partOfSpeech],
        ['Pronunciation', word.pronunciation],
        ['Example', word.exampleSentence],
        ['Synonyms', word.synonyms],
        ['Antonyms', word.antonyms],
      ];
      document.getElementById('modalBody').innerHTML = rows
        .filter(([,v]) => v)
        .map(([l,v,isUrdu]) => `
          <div class="detail-row">
            <div class="detail-label">${l}</div>
            <div class="detail-value ${isUrdu ? 'urdu' : ''}">${escHtml(v)}</div>
          </div>
        `).join('');
      document.getElementById('wordModal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('wordModal')) {
        document.getElementById('wordModal').classList.remove('open');
      }
    }

    function renderPagination(data, containerId, loadFn) {
      const cont = document.getElementById(containerId);
      if (data.totalPages <= 1) { cont.innerHTML = ''; return; }
      let html = `<button class="page-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="changePage(${currentPage-1},'${containerId}',${loadFn.name})">‹</button>`;
      for (let i = 0; i < data.totalPages; i++) {
        if (i === 0 || i === data.totalPages-1 || Math.abs(i-currentPage) <= 2) {
          html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i},'${containerId}',${loadFn.name})">${i+1}</button>`;
        } else if (Math.abs(i-currentPage) === 3) { html += '<span style="color:var(--text-muted);">…</span>'; }
      }
      html += `<button class="page-btn" ${currentPage === data.totalPages-1 ? 'disabled' : ''} onclick="changePage(${currentPage+1},'${containerId}',${loadFn.name})">›</button>`;
      html += `<span class="page-info">Page ${currentPage+1} of ${data.totalPages}</span>`;
      cont.innerHTML = html;
    }

    function changePage(page, containerId, fnName) {
      currentPage = page;
      if (fnName === 'loadSubjectWords') loadSubjectWords();
      else fetchGlobalSearch();
      window.scrollTo(0,0);
    }

    function goBack() { showPage('home'); }
    function escHtml(str) { if(!str) return ''; const d=document.createElement('div'); d.appendChild(document.createTextNode(str)); return d.innerHTML; }
    function logout() { localStorage.clear(); window.location.href='index.html'; }
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlayBg').classList.toggle('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlayBg').classList.remove('open');
    }

    // Init
    loadSubjects();
</script>
</body>
</html>
