<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#c9a84c"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="LughatPro"/>
    <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
    <title>LughatPro — Member Dashboard</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
          --gold:#c9a84c; --gold-light:#e8c96e;
          --dark:#0f0f14; --dark2:#1a1a24; --dark3:#252533;
          --emerald:#2dd4bf; --text:#e8e8f0; --text-muted:#8b8b9a;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; }
        body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
        .urdu { font-family:'Noto Nastaliq Urdu','Jameel Noori Nastaleeq',serif; direction:rtl; line-height:2.2; font-size:1.1em; }

        /* ── SIDEBAR ──────────────────────────────────────────── */
        .sidebar {
          width:260px; height:100vh; position:fixed; left:0; top:0; z-index:100;
          background:linear-gradient(180deg,var(--dark2) 0%,var(--dark) 100%);
          border-right:1px solid rgba(201,168,76,0.12);
          display:flex; flex-direction:column;
          transition:transform 0.3s ease;
          overflow-y:auto;
        }
        .sidebar-logo { padding:1.8rem 1.5rem 1.2rem; border-bottom:1px solid rgba(201,168,76,0.1); flex-shrink:0; }
        .logo-text { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:900;
          background:linear-gradient(135deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-sub { font-size:0.72rem; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }

        .nav-section { padding:1.5rem 1rem; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .nav-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted);
          font-weight:600; padding:0 0.5rem; margin-bottom:0.6rem; }
        .nav-item { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 0.75rem;
          border-radius:10px; cursor:pointer; margin-bottom:0.2rem;
          color:var(--text-muted); font-size:0.88rem; font-weight:500; transition:all 0.2s; text-decoration:none; }
        .nav-item:hover  { background:rgba(201,168,76,0.08); color:var(--text); }
        .nav-item.active { background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.06));
          color:var(--gold-light); border-left:2px solid var(--gold); }
        .nav-icon { font-size:1.1rem; width:20px; text-align:center; }

        .sidebar-user { padding:1.2rem 1.5rem; border-top:1px solid rgba(201,168,76,0.1);
          display:flex; align-items:center; gap:0.75rem; flex-shrink:0; }
        .user-avatar { width:36px; height:36px; border-radius:50%;
          background:linear-gradient(135deg,var(--gold),#b8952e);
          display:flex; align-items:center; justify-content:center;
          font-size:0.85rem; font-weight:700; color:var(--dark); flex-shrink:0; }
        .user-name  { font-size:0.88rem; font-weight:600; color:var(--text); }
        .user-role  { font-size:0.72rem; color:var(--emerald); }
        .logout-btn { margin-left:auto; background:none; border:none; cursor:pointer;
          color:var(--text-muted); font-size:1.2rem; transition:color 0.2s; padding:4px; }
        .logout-btn:hover { color:#ef4444; }

        /* ── MAIN ────────────────────────────────────────────── */
        .main {
          margin-left:260px;
          padding:2rem;
          min-height:100vh;
          /* ✅ FIX: allow content + pagination to scroll freely */
          overflow-x:hidden;
        }
        .page { display:none; }
        .page.active { display:block; }

        /* ── TOP BAR (mobile hamburger row) ─────────────────── */
        .mobile-topbar {
          display:none;
          align-items:center; gap:1rem;
          margin-bottom:1.5rem;
          position:sticky; top:0; z-index:50;
          background:var(--dark);
          padding:0.75rem 0;
        }
        .menu-toggle { background:none; border:none; color:var(--text); font-size:1.5rem;
          cursor:pointer; padding:4px; line-height:1; }

        /* ── PAGE TITLE / TOPBAR ─────────────────────────────── */
        .topbar { display:flex; align-items:center; justify-content:space-between;
          margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-title { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:var(--text); }
        .page-title span { color:var(--gold); }

        /* ── SEARCH BAR ──────────────────────────────────────── */
        .search-bar { display:flex; gap:0.75rem; margin-bottom:2rem; width:100%; max-width:700px; }
        .search-input-wrap { flex:1; position:relative; min-width:0; }
        .search-input {
          width:100%; padding:0.85rem 1rem 0.85rem 3rem;
          background:var(--dark3); border:1px solid rgba(201,168,76,0.2);
          border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem;
          outline:none; transition:all 0.3s;
        }
        .search-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
        .search-icon { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:1rem; color:var(--text-muted); pointer-events:none; }
        .btn-gold { padding:0.8rem 1.2rem; background:linear-gradient(135deg,var(--gold),#b8952e);
          border:none; border-radius:10px; color:var(--dark); font-family:'DM Sans',sans-serif;
          font-weight:700; font-size:0.9rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
        .btn-gold:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,168,76,0.3); }
        .btn-outline { padding:0.6rem 1rem; background:transparent;
          border:1px solid rgba(201,168,76,0.3); border-radius:8px;
          color:var(--gold); font-family:'DM Sans',sans-serif; font-weight:500; font-size:0.85rem;
          cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
        .btn-outline:hover { background:rgba(201,168,76,0.1); }

        /* ── SUBJECTS GRID ───────────────────────────────────── */
        .subjects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.2rem; }
        .subject-card { background:var(--dark3); border:1px solid rgba(255,255,255,0.06);
          border-radius:16px; padding:1.5rem; cursor:pointer;
          transition:all 0.3s; position:relative; overflow:hidden; }
        .subject-card::before { content:''; position:absolute; inset:0; opacity:0;
          background:linear-gradient(135deg,rgba(201,168,76,0.05),transparent); transition:opacity 0.3s; }
        .subject-card:hover { border-color:rgba(201,168,76,0.35); transform:translateY(-3px);
          box-shadow:0 12px 30px rgba(0,0,0,0.4); }
        .subject-card:hover::before { opacity:1; }
        .subject-icon  { font-size:2.2rem; margin-bottom:0.9rem; }
        .subject-name  { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
        .subject-count { font-size:0.8rem; color:var(--text-muted); }
        .subject-count span { color:var(--gold); font-weight:600; }
        .subject-dot   { width:8px; height:8px; border-radius:50%; position:absolute; top:1.2rem; right:1.2rem; }

        /* ── WORD CARDS ──────────────────────────────────────── */
        .section-header { display:flex; align-items:center; justify-content:space-between;
          margin-bottom:1.5rem; flex-wrap:wrap; gap:0.8rem; }
        .back-btn { display:flex; align-items:center; gap:0.5rem; background:none; border:none;
          color:var(--text-muted); cursor:pointer; font-size:0.88rem; transition:color 0.2s;
          padding:6px 0; }
        .back-btn:hover { color:var(--gold); }

        .words-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }
        .word-card { background:var(--dark3); border:1px solid rgba(255,255,255,0.06);
          border-radius:14px; padding:1.3rem; cursor:pointer; transition:all 0.25s; }
        .word-card:hover { border-color:rgba(201,168,76,0.3); transform:translateY(-2px);
          box-shadow:0 8px 24px rgba(0,0,0,0.3); }
        .word-english { font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:0.4rem; }
        .word-urdu    { font-size:1.1rem; color:var(--gold-light); margin-bottom:0.5rem; }
        .word-pos     { display:inline-block; font-size:0.72rem; text-transform:uppercase;
          letter-spacing:0.06em; padding:2px 8px; border-radius:20px;
          background:rgba(201,168,76,0.12); color:var(--gold); font-weight:600; }
        .word-meaning { font-size:0.83rem; color:var(--text-muted); margin-top:0.5rem; line-height:1.5;
          display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

        /* ── PAGINATION  ✅ FIXED ─────────────────────────────── */
        .pagination {
          display:flex;
          justify-content:center;
          align-items:center;
          flex-wrap:wrap;          /* ✅ wrap on small screens */
          gap:0.4rem;
          margin-top:2rem;
          margin-bottom:3rem;      /* ✅ space at bottom so buttons aren't hidden */
          padding:0.5rem 0;
          width:100%;
        }
        .page-btn {
          padding:0.55rem 1rem;    /* ✅ bigger tap target */
          border-radius:8px;
          border:1px solid rgba(201,168,76,0.2);
          background:transparent;
          color:var(--text-muted);
          cursor:pointer;
          font-size:0.9rem;
          font-family:'DM Sans',sans-serif;
          transition:all 0.2s;
          min-width:40px;          /* ✅ min tap size */
          min-height:40px;         /* ✅ min tap size */
          display:inline-flex;
          align-items:center;
          justify-content:center;
          -webkit-tap-highlight-color:transparent;
        }
        .page-btn:hover, .page-btn.active {
          background:var(--gold); border-color:var(--gold);
          color:var(--dark); font-weight:700;
        }
        .page-btn:disabled { opacity:0.3; cursor:default; pointer-events:none; }
        .page-info { font-size:0.82rem; color:var(--text-muted); padding:0 0.4rem; }

        /* ── MODAL ───────────────────────────────────────────── */
        .modal-overlay {
          position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200;
          display:flex; align-items:flex-end; justify-content:center; /* ✅ bottom sheet on mobile */
          padding:0;
          opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal {
          background:var(--dark2); border:1px solid rgba(201,168,76,0.2);
          border-radius:20px 20px 0 0;   /* ✅ rounded top only on mobile */
          width:100%; max-width:100%;
          max-height:88vh;
          overflow-y:auto; -webkit-overflow-scrolling:touch;
          transform:translateY(100%); transition:transform 0.35s ease;
        }
        .modal-overlay.open .modal { transform:translateY(0); }
        .modal-handle { width:40px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15);
          margin:12px auto 0; }
        .modal-header { padding:1rem 1.5rem 1rem; border-bottom:1px solid rgba(255,255,255,0.06);
          display:flex; justify-content:space-between; align-items:center; }
        .modal-close { background:none; border:none; color:var(--text-muted); font-size:1.5rem;
          cursor:pointer; padding:4px; }
        .modal-body { padding:1.5rem; padding-bottom:2rem; }
        .detail-row { display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; }
        .detail-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;
          color:var(--text-muted); font-weight:600; min-width:100px; padding-top:2px; }
        .detail-value { font-size:0.92rem; color:var(--text); line-height:1.6; flex:1; }

        /* ── LOADING / EMPTY ─────────────────────────────────── */
        .loading    { display:flex; justify-content:center; align-items:center; padding:4rem; }
        .spinner    { width:36px; height:36px; border:3px solid rgba(201,168,76,0.2);
          border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .empty-state { text-align:center; padding:4rem 2rem; }
        .empty-icon  { font-size:3.5rem; margin-bottom:1rem; }
        .empty-title { font-size:1.1rem; color:var(--text-muted); font-weight:500; }

        /* ── OVERLAY (sidebar backdrop on mobile) ────────────── */
        .overlay-bg { display:none; }

        /* ══════════════════════════════════════════════════════
           MOBILE BREAKPOINT  ✅ ALL FIXES HERE
        ══════════════════════════════════════════════════════ */
        @media(max-width:768px) {
          /* Sidebar slides off screen */
          .sidebar { transform:translateX(-100%); }
          .sidebar.open  { transform:translateX(0); box-shadow:4px 0 24px rgba(0,0,0,0.5); }

          /* Main takes full width */
          .main { margin-left:0; padding:0 1rem 1rem; }

          /* Show mobile top bar */
          .mobile-topbar { display:flex; }

          /* Backdrop */
          .overlay-bg {
            display:block; position:fixed; inset:0;
            background:rgba(0,0,0,0.6); z-index:99;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
          }
          .overlay-bg.open { opacity:1; pointer-events:all; }

          /* Tighter grids */
          .subjects-grid { grid-template-columns:repeat(2,1fr); gap:0.8rem; }
          .words-grid    { grid-template-columns:1fr; }

          /* Search bar — full width, stack on very small screens */
          .search-bar { max-width:100%; gap:0.5rem; }

          /* ✅ Pagination — larger tap targets, more space */
          .pagination {
            gap:0.35rem;
            margin-bottom:4rem;   /* extra space at very bottom */
            padding:0.75rem 0;
          }
          .page-btn {
            padding:0.6rem 0.9rem;
            font-size:0.95rem;
            min-width:44px;
            min-height:44px;
          }

          /* Page title smaller */
          .page-title { font-size:1.4rem; }

          /* Modal is already bottom-sheet, just ensure padding */
          .modal-body { padding:1.2rem; padding-bottom:env(safe-area-inset-bottom, 2rem); }
        }

        @media(max-width:380px) {
          .subjects-grid { grid-template-columns:1fr 1fr; gap:0.6rem; }
          .subject-card  { padding:1rem; }
          .subject-icon  { font-size:1.8rem; }
          .page-btn      { padding:0.55rem 0.7rem; font-size:0.85rem; }
        }
    </style>
</head>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[PWA] Registered, scope:', r.scope))
          .catch(e => console.error('[PWA] Failed:', e));
      });
    }
</script>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-text">📖 LughatPro</div>
        <div class="logo-sub">Member Dashboard</div>
    </div>
    <nav class="nav-section">
        <div class="nav-label">Navigation</div>
        <a class="nav-item active" onclick="showPage('home')"   id="nav-home">   <span class="nav-icon">🏠</span> Home</a>
        <a class="nav-item"        onclick="showPage('search')" id="nav-search">  <span class="nav-icon">🔍</span> Search Words</a>
        <div class="nav-label" style="margin-top:1rem;">Subjects</div>
        <div id="subjectNav"></div>
    </nav>
    <div class="sidebar-user">
        <div class="user-avatar" id="userInitial">M</div>
        <div>
            <div class="user-name" id="sidebarUsername">Member</div>
            <div class="user-role">Read-only Access</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">⏏️</button>
    </div>
</aside>
<div class="overlay-bg" id="overlayBg" onclick="closeSidebar()"></div>

<!-- ═══ MAIN ═══ -->
<main class="main">

    <!-- Mobile top bar -->
    <div class="mobile-topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold);">LughatPro</span>
    </div>

    <!-- ─── HOME PAGE ─── -->
    <div class="page active" id="page-home">
        <div class="topbar">
            <div>
                <div class="page-title">Welcome to <span>LughatPro</span></div>
                <div style="color:var(--text-muted);font-size:0.85rem;margin-top:0.3rem;">Browse subjects or search the entire dictionary</div>
            </div>
        </div>

        <div class="search-bar" style="max-width:100%;margin-bottom:2rem;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="homeSearch"
                       placeholder="Search English or Urdu words…"
                       oninput="debounceSearch()"
                       onkeydown="if(event.key==='Enter')runGlobalSearch()"/>
            </div>
            <button class="btn-gold" onclick="runGlobalSearch()">Search</button>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem;">
            <div style="background:var(--dark3);border:1px solid rgba(201,168,76,0.12);border-radius:14px;padding:1.2rem;">
                <div style="font-size:1.8rem;font-weight:700;color:var(--gold);" id="totalSubjectsCount">—</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Total Subjects</div>
            </div>
            <div style="background:var(--dark3);border:1px solid rgba(45,212,191,0.12);border-radius:14px;padding:1.2rem;">
                <div style="font-size:1.8rem;font-weight:700;color:var(--emerald);" id="totalWordsCount">—</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Total Words</div>
            </div>
        </div>

        <div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1rem;">📚 Browse Subjects</div>
        <div class="subjects-grid" id="subjectsGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- ─── SUBJECT WORDS PAGE ─── -->
    <div class="page" id="page-subject">
        <div class="section-header">
            <button class="back-btn" onclick="goBack()">← Back to Subjects</button>
            <div style="font-size:0.82rem;color:var(--text-muted);" id="subjectWordCount"></div>
        </div>

        <div class="topbar" style="margin-bottom:1rem;">
            <div>
                <div class="page-title" id="subjectPageTitle">Subject</div>
                <div style="color:var(--text-muted);font-size:0.82rem;margin-top:0.3rem;" id="subjectPageDesc"></div>
            </div>
        </div>

        <div class="search-bar" style="max-width:600px;margin-bottom:1.5rem;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="subjectSearch"
                       placeholder="Search within this subject…"
                       oninput="debounceSubjectSearch()"
                       onkeydown="if(event.key==='Enter')debounceSubjectSearch()"/>
            </div>
            <button class="btn-outline" onclick="clearSubjectSearch()">Clear</button>
        </div>

        <div id="subjectWordsContainer"></div>
        <!-- ✅ Pagination is INSIDE the page div, not clipped -->
        <div class="pagination" id="subjectPagination"></div>
    </div>

    <!-- ─── GLOBAL SEARCH PAGE ─── -->
    <div class="page" id="page-search">
        <div class="topbar">
            <div class="page-title">🔍 <span>Search Dictionary</span></div>
        </div>

        <div class="search-bar" style="max-width:700px;margin-bottom:1.5rem;">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="globalSearchInput"
                       placeholder="Type English or Urdu to search…"
                       onkeydown="if(event.key==='Enter')runPageSearch()"/>
            </div>
            <button class="btn-gold" onclick="runPageSearch()">Search</button>
        </div>

        <div id="searchResultsContainer"></div>
        <!-- ✅ Pagination is INSIDE the page div -->
        <div class="pagination" id="searchPagination"></div>
    </div>

</main>

<!-- ═══ WORD DETAIL MODAL (bottom sheet) ═══ -->
<div class="modal-overlay" id="wordModal" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div>
                <div style="font-size:1.2rem;font-weight:700;" id="modalEngWord"></div>
                <div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;" id="modalSubjectName"></div>
            </div>
            <button class="modal-close" onclick="closeWordModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    const API = 'https://dictionary-app-xsxj.onrender.com/api';  // ← your Render URL
    let authToken = '';
    let subjects  = [];
    let currentSubjectId   = null;
    let currentPage        = 0;
    let currentSearchKw    = '';
    let searchTimer;

    // ── Auth ──────────────────────────────────────────────────────
    const userStr = localStorage.getItem('user');
    if (!userStr) { window.location.href = '/login'; }
    const user = JSON.parse(userStr);
    authToken = user.token;
    if (user.role === 'ROLE_ADMIN') { window.location.href = '/admin'; }
    document.getElementById('userInitial').textContent     = (user.username || 'M')[0].toUpperCase();
    document.getElementById('sidebarUsername').textContent = user.fullName || user.username;

    const H = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${authToken}` });

    // ── Load subjects ─────────────────────────────────────────────
    async function loadSubjects() {
      try {
        const res = await fetch(`${API}/subjects`, { headers: H() });
        subjects  = await res.json();

        document.getElementById('totalSubjectsCount').textContent = subjects.length;
        fetch(`${API}/words/stats`, { headers: H() })
          .then(r => r.json()).then(d => {
            document.getElementById('totalWordsCount').textContent = (d.totalWords || 0).toLocaleString();
          }).catch(() => {});

        // Sidebar nav links
        document.getElementById('subjectNav').innerHTML = subjects.map(s => `
          <a class="nav-item" onclick="openSubject(${s.id})" id="nav-s-${s.id}">
            <span class="nav-icon">${s.icon || '📚'}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.name}</span>
            <span style="font-size:0.68rem;background:rgba(201,168,76,0.12);color:var(--gold);padding:1px 6px;border-radius:10px;">${s.wordCount || 0}</span>
          </a>`).join('');

        // Subject cards grid
        document.getElementById('subjectsGrid').innerHTML = subjects.map(s => `
          <div class="subject-card" onclick="openSubject(${s.id})" style="border-top:3px solid ${s.color || '#c9a84c'};">
            <div class="subject-dot" style="background:${s.color || '#c9a84c'};"></div>
            <div class="subject-icon">${s.icon || '📚'}</div>
            <div class="subject-name">${escHtml(s.name)}</div>
            <div class="subject-count"><span>${s.wordCount || 0}</span> words</div>
            ${s.description ? `<div style="font-size:0.73rem;color:var(--text-muted);margin-top:0.5rem;line-height:1.4;">${escHtml(s.description)}</div>` : ''}
          </div>`).join('');
      } catch(e) {
        document.getElementById('subjectsGrid').innerHTML =
          '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load subjects</div></div>';
      }
    }

    // ── Page navigation ───────────────────────────────────────────
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      const nav = document.getElementById('nav-' + name);
      if (nav) nav.classList.add('active');
      closeSidebar();
      window.scrollTo(0, 0);
      sessionStorage.setItem('currentPage', name);
    }

    // ── Open a subject ────────────────────────────────────────────
    async function openSubject(id) {
      currentSubjectId = id;
      currentPage      = 0;
      currentSearchKw  = '';
      document.getElementById('subjectSearch').value = '';

      const s = subjects.find(x => x.id === id);
      if (s) {
        document.getElementById('subjectPageTitle').innerHTML =
          `${s.icon || '📚'} <span style="color:var(--gold)">${escHtml(s.name)}</span>`;
        document.getElementById('subjectPageDesc').textContent = s.description || '';
      }
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navItem = document.getElementById('nav-s-' + id);
      if (navItem) navItem.classList.add('active');

      showPage('subject');
      await loadSubjectWords();
    }

    // ── Load words for current subject ───────────────────────────
    async function loadSubjectWords() {
      const container = document.getElementById('subjectWordsContainer');
      const pager     = document.getElementById('subjectPagination');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      pager.innerHTML = '';

      const kw = currentSearchKw;
      const url = kw
        ? `${API}/words/subject/${currentSubjectId}/search?keyword=${encodeURIComponent(kw)}&page=${currentPage}&size=20`
        : `${API}/words/subject/${currentSubjectId}?page=${currentPage}&size=20`;

      try {
        const res  = await fetch(url, { headers: H() });
        const data = await res.json();
        document.getElementById('subjectWordCount').textContent =
          `${(data.totalItems || 0).toLocaleString()} words`;
        renderWords(data.content || [], container);
        renderPagination(data, pager, () => loadSubjectWords());
      } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load words</div></div>';
      }
    }

    // ── Subject search ────────────────────────────────────────────
    function debounceSubjectSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearchKw = document.getElementById('subjectSearch').value.trim();
        currentPage = 0;
        loadSubjectWords();
      }, 400);
    }

    function clearSubjectSearch() {
      document.getElementById('subjectSearch').value = '';
      currentSearchKw = '';
      currentPage = 0;
      loadSubjectWords();
    }

    // ── Home search ───────────────────────────────────────────────
    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        if (document.getElementById('homeSearch').value.trim()) runGlobalSearch();
      }, 500);
    }

    async function runGlobalSearch() {
      const kw = document.getElementById('homeSearch').value.trim();
      if (!kw) return;
      document.getElementById('globalSearchInput').value = kw;
      showPage('search');
      currentSearchKw = kw;
      currentPage = 0;
      await fetchGlobalSearch();
    }

    async function runPageSearch() {
      const kw = document.getElementById('globalSearchInput').value.trim();
      if (!kw) return;
      currentSearchKw = kw;
      currentPage = 0;
      await fetchGlobalSearch();
    }

    async function fetchGlobalSearch() {
      const container = document.getElementById('searchResultsContainer');
      const pager     = document.getElementById('searchPagination');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      pager.innerHTML = '';

      try {
        const res  = await fetch(
          `${API}/words/global-search?keyword=${encodeURIComponent(currentSearchKw)}&page=${currentPage}&size=20`,
          { headers: H() });
        const data = await res.json();

        if (!data.content || data.content.length === 0) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div>
            <div class="empty-title">No results for "<strong>${escHtml(currentSearchKw)}</strong>"</div></div>`;
        } else {
          const info = document.createElement('div');
          info.style.cssText = 'margin-bottom:1rem;font-size:0.85rem;color:var(--text-muted);';
          info.innerHTML = `Found <strong style="color:var(--gold)">${data.totalItems}</strong> results`;
          container.innerHTML = '';
          container.appendChild(info);
          renderWords(data.content, container, true);
        }
        renderPagination(data, pager, () => fetchGlobalSearch());
      } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Search failed</div></div>';
      }
    }

    // ── Render word cards ─────────────────────────────────────────
    function renderWords(words, container, append = false) {
      if (!words || words.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No words found</div></div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'words-grid';
      grid.innerHTML = words.map(w => `
        <div class="word-card" onclick='showWordDetail(${JSON.stringify(w).replace(/'/g,"&#39;")})'>
          <div class="word-english">${escHtml(w.englishWord)}</div>
          ${w.urduMeaning  ? `<div class="word-urdu urdu">${escHtml(w.urduMeaning)}</div>` : ''}
          ${w.partOfSpeech ? `<span class="word-pos">${escHtml(w.partOfSpeech)}</span>` : ''}
          ${w.englishMeaning ? `<div class="word-meaning">${escHtml(w.englishMeaning)}</div>` : ''}
          ${w.subjectName ? `<div style="margin-top:0.6rem;font-size:0.72rem;color:var(--text-muted);">📚 ${escHtml(w.subjectName)}</div>` : ''}
        </div>`).join('');

      if (append) {
        const existing = container.querySelector('.words-grid');
        if (existing) existing.replaceWith(grid);
        else container.appendChild(grid);
      } else {
        container.innerHTML = '';
        container.appendChild(grid);
      }
    }

    // ── ✅ FIXED Pagination ───────────────────────────────────────
    function renderPagination(data, pagerEl, loadFn) {
      pagerEl.innerHTML = '';
      const total = data.totalPages || 0;
      if (total <= 1) return;

      const cur = currentPage;

      // Prev button
      const prev = makePageBtn(cur === 0, '‹ Prev', () => { currentPage = cur - 1; loadFn(); });
      pagerEl.appendChild(prev);

      // Page number buttons (smart range)
      const start = Math.max(0, cur - 2);
      const end   = Math.min(total - 1, cur + 2);

      if (start > 0) {
        pagerEl.appendChild(makePageBtn(false, '1', () => { currentPage = 0; loadFn(); }));
        if (start > 1) pagerEl.appendChild(makeEllipsis());
      }
      for (let i = start; i <= end; i++) {
        const btn = makePageBtn(false, String(i + 1), () => { currentPage = i; loadFn(); });
        if (i === cur) { btn.classList.add('active'); btn.disabled = true; }
        pagerEl.appendChild(btn);
      }
      if (end < total - 1) {
        if (end < total - 2) pagerEl.appendChild(makeEllipsis());
        pagerEl.appendChild(makePageBtn(false, String(total), () => { currentPage = total - 1; loadFn(); }));
      }

      // Next button
      const next = makePageBtn(cur === total - 1, 'Next ›', () => { currentPage = cur + 1; loadFn(); });
      pagerEl.appendChild(next);

      // Page info
      const info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = `${cur + 1} / ${total}`;
      pagerEl.appendChild(info);

      // ✅ Scroll to top of content when paginating
    }

    function makePageBtn(isDisabled, label, onClick) {
      const btn = document.createElement('button');
      btn.className = 'page-btn';
      btn.textContent = label;
      btn.disabled = isDisabled;
      if (!isDisabled) btn.addEventListener('click', () => { onClick(); window.scrollTo({top:0, behavior:'smooth'}); });
      return btn;
    }

    function makeEllipsis() {
      const s = document.createElement('span');
      s.className = 'page-info';
      s.textContent = '…';
      return s;
    }

    // ── Word detail modal ─────────────────────────────────────────
    function showWordDetail(word) {
      document.getElementById('modalEngWord').textContent    = word.englishWord;
      document.getElementById('modalSubjectName').textContent = word.subjectName || '';
      const rows = [
        ['Urdu Meaning',   word.urduMeaning,    true],
        ['English Meaning',word.englishMeaning],
        ['Part of Speech', word.partOfSpeech],
        ['Pronunciation',  word.pronunciation],
        ['Example',        word.exampleSentence],
        ['Synonyms',       word.synonyms],
        ['Antonyms',       word.antonyms],
      ];
      document.getElementById('modalBody').innerHTML = rows
        .filter(([, v]) => v)
        .map(([l, v, isUrdu]) => `
          <div class="detail-row">
            <div class="detail-label">${l}</div>
            <div class="detail-value ${isUrdu ? 'urdu' : ''}">${escHtml(v)}</div>
          </div>`).join('');
      document.getElementById('wordModal').classList.add('open');
      document.body.style.overflow = 'hidden'; // prevent background scroll
    }

    function closeWordModal() {
      document.getElementById('wordModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('wordModal')) closeWordModal();
    }

    // ── Utilities ─────────────────────────────────────────────────
    function goBack() { showPage('home'); }

    function escHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    function logout() { localStorage.clear(); window.location.href = '/login'; }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlayBg').classList.toggle('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlayBg').classList.remove('open');
    }

    // ── Swipe to close sidebar on mobile ─────────────────────────
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (dx < -60 && document.getElementById('sidebar').classList.contains('open')) closeSidebar();
    }, { passive:true });

    // ── Init ──────────────────────────────────────────────────────
    const savedPage = sessionStorage.getItem('currentPage') || 'home';
showPage(savedPage);
loadSubjects();
</script>
</body>
</html>
